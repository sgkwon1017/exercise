<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interactive Warm Up Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@latest/dist/teachablemachine-pose.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #webcam-container canvas {
            width: 100%;
            border-radius: 0.5rem;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen">

    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-bold text-yellow-400 mb-2">AI 인터랙티브 웜업</h1>
            <p class="text-gray-400">영상의 동작을 따라하고 점수를 획득하세요!</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- 왼쪽: 유튜브 영상 및 게임 가이드 -->
            <div class="space-y-4">
                <div class="bg-black rounded-xl overflow-hidden shadow-2xl">
                    <div class="video-container">
                        <div id="player"></div>
                    </div>
                </div>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xl font-semibold">현재 목표 동작:</span>
                        <span id="target-action" class="text-3xl font-black text-green-400 tracking-widest">준비 중...</span>
                    </div>
                    <div class="w-full bg-gray-700 h-4 rounded-full overflow-hidden">
                        <div id="action-progress" class="bg-green-500 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 웹캠 및 점수판 -->
            <div class="space-y-4 text-center">
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 relative">
                    <div id="webcam-container" class="bg-black rounded-lg overflow-hidden flex justify-center items-center h-[300px]">
                        <!-- 웹캠 캔버스가 여기에 삽입됨 -->
                        <div id="loading-spinner" class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-yellow-400"></div>
                    </div>
                    <div class="absolute top-6 right-6 bg-yellow-500 text-black px-4 py-2 rounded-full font-bold shadow-lg">
                        점수: <span id="score">0</span>
                    </div>
                </div>

                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
                    <h3 class="text-lg font-bold mb-4">인식 상태</h3>
                    <div id="label-container" class="grid grid-cols-2 gap-2 text-sm">
                        <!-- 티처블 머신 레이블 결과가 여기에 표시됨 -->
                    </div>
                </div>

                <button id="start-btn" onclick="initGame()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-4 rounded-xl text-xl transition-all shadow-lg active:scale-95">
                    게임 시작하기 (카메라 권한 필요)
                </button>
            </div>
        </div>
    </div>

    <!-- 커스텀 알림/메시지 박스 -->
    <div id="msg-box" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-yellow-400 text-black px-8 py-3 rounded-full font-bold text-lg hidden shadow-2xl transition-all">
    </div>

    <script>
        // --- 설정 데이터 ---
        const URL = "https://teachablemachine.withgoogle.com/models/WvWLTRByO/";
        const VIDEO_ID = "oRr5hxr_bRA";
        
        // 영상 타임라인별 정답 동작 정의 (초 단위)
        // 영상 내용에 따라 시간대를 조정하세요
        const ACTION_TIMELINE = [
            { start: 0, end: 14, action: "REST" },
            { start: 15, end: 32, action: "SAY HI" },
            { start: 33, end: 42, action: "WALK" },
            { start: 43, end: 54, action: "SWING" },
            { start: 55, end: 68, action: "PAW" },
            { start: 69, end: 86, action: "JUMP" }
        ];

        let model, webcam, ctx, labelContainer, maxPredictions;
        let player;
        let score = 0;
        let currentTargetAction = "REST";
        let isGameRunning = false;

        // 유튜브 API 준비
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '360',
                width: '640',
                videoId: VIDEO_ID,
                playerVars: {
                    'autoplay': 0,
                    'controls': 1,
                    'rel': 0,
                    'modestbranding': 1
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                isGameRunning = true;
                updateGameLoop();
            } else {
                isGameRunning = false;
            }
        }

        // 게임 루프: 현재 영상 시간에 맞는 동작 업데이트 및 점수 체크
        function updateGameLoop() {
            if (!isGameRunning) return;

            const currentTime = player.getCurrentTime();
            const foundAction = ACTION_TIMELINE.find(item => currentTime >= item.start && currentTime <= item.end);

            if (foundAction && foundAction.action !== currentTargetAction) {
                currentTargetAction = foundAction.action;
                document.getElementById('target-action').innerText = currentTargetAction;
                showMessage(`동작 변경: ${currentTargetAction}!`);
            }

            requestAnimationFrame(updateGameLoop);
        }

        // 티처블 머신 모델 로드 및 웹캠 초기화
        async function initGame() {
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = true;
            startBtn.innerText = "로딩 중...";

            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                // 모델 로드
                model = await tmPose.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // 웹캠 설정
                const size = 300;
                const flip = true;
                webcam = new tmPose.Webcam(size, size, flip);
                await webcam.setup();
                await webcam.play();
                
                document.getElementById('loading-spinner').style.display = 'none';
                window.requestAnimationFrame(loop);

                // 캔버스 설정
                const canvas = document.createElement("canvas");
                canvas.width = size; canvas.height = size;
                ctx = canvas.getContext("2d");
                document.getElementById("webcam-container").appendChild(canvas);

                // 레이블 컨테이너 설정
                labelContainer = document.getElementById("label-container");
                for (let i = 0; i < maxPredictions; i++) {
                    const div = document.createElement("div");
                    div.className = "bg-gray-700 p-2 rounded flex justify-between";
                    div.innerHTML = `<span></span><span class='font-mono text-yellow-400'>0%</span>`;
                    labelContainer.appendChild(div);
                }

                startBtn.classList.add('hidden');
                showMessage("모델 로드 완료! 영상을 재생하세요.");
                player.playVideo();

            } catch (e) {
                console.error(e);
                alert("웹캠을 시작할 수 없습니다. 권한을 확인해주세요.");
                startBtn.disabled = false;
                startBtn.innerText = "다시 시도";
            }
        }

        async function loop(timestamp) {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className;
                const prob = prediction[i].probability.toFixed(2);
                
                const labelDiv = labelContainer.childNodes[i];
                labelDiv.childNodes[0].innerText = classPrediction;
                labelDiv.childNodes[1].innerText = (prob * 100).toFixed(0) + "%";

                // 점수 계산 로직: 현재 목표 동작과 85% 이상 일치할 때
                if (isGameRunning && classPrediction === currentTargetAction && prob > 0.85) {
                    increaseScore();
                    labelDiv.classList.replace('bg-gray-700', 'bg-green-900');
                } else {
                    labelDiv.classList.replace('bg-green-900', 'bg-gray-700');
                }
            }

            drawPose(pose);
        }

        function increaseScore() {
            score += 1; // 초당 프레임 단위로 올라가므로 실제로는 매우 빠르게 상승
            document.getElementById('score').innerText = Math.floor(score / 10);
            
            // 프로그레스 바 시각화 (동작 유지 게이지처럼 활용 가능)
            const progress = (score % 100);
            document.getElementById('action-progress').style.width = progress + "%";
        }

        function drawPose(pose) {
            if (webcam.canvas) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    const minPartConfidence = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }

        function showMessage(text) {
            const box = document.getElementById('msg-box');
            box.innerText = text;
            box.classList.remove('hidden');
            setTimeout(() => {
                box.classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
